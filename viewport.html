<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .game-container {
            position: relative;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* 游戏画布样式 */
        #game-board {
            border: 3px solid #333;
            background-color: #111;
        }

        /* 游戏信息面板 */
        .game-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .score-box {
            font-size: 18px;
        }

        .score-box span {
            font-weight: bold;
            color: #e63946;
            font-size: 24px;
        }

        /* 控制按钮样式 */
        .control-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #457b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d3557;
        }

        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        /* 操作说明 */
        .instructions {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="game-board" width="300" height="600"></canvas>
        
        <div class="game-info">
            <div class="score-box">
                得分: <span id="score">0</span>
            </div>
            
            <div class="control-buttons">
                <button id="start-btn">开始游戏</button>
                <button id="pause-btn" disabled>暂停游戏</button>
                <button id="restart-btn">重新开始</button>
            </div>
            
            <div class="instructions">
                <p>🎮 操作说明：</p>
                <p>← 左移 | → 右移 | ↓ 加速下落</p>
                <p>↑ 旋转方块 | 空格 直接下落</p>
            </div>
        </div>
    </div>

    <script>
        // 1. 游戏基础配置
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const restartBtn = document.getElementById('restart-btn');

        // 方块大小和游戏网格尺寸
        const BLOCK_SIZE = 30;
        const COLS = 10;  // 列数
        const ROWS = 20;  // 行数

        // 游戏状态
        let gameInterval;
        let isRunning = false;
        let isPaused = false;
        let score = 0;

        // 2. 方块形状和颜色定义（经典7种形状）
        const SHAPES = [
            // I型
            [[1, 1, 1, 1]],
            // J型
            [[1, 0, 0], [1, 1, 1]],
            // L型
            [[0, 0, 1], [1, 1, 1]],
            // O型
            [[1, 1], [1, 1]],
            // S型
            [[0, 1, 1], [1, 1, 0]],
            // T型
            [[0, 1, 0], [1, 1, 1]],
            // Z型
            [[1, 1, 0], [0, 1, 1]]
        ];

        // 方块颜色（对应上面的形状）
        const COLORS = [
            '#00ffff', // 浅蓝(I)
            '#0000ff', // 深蓝(J)
            '#ffa500', // 橙色(L)
            '#ffff00', // 黄色(O)
            '#00ff00', // 绿色(S)
            '#800080', // 紫色(T)
            '#ff0000'  // 红色(Z)
        ];

        // 3. 游戏网格初始化
        let board = [];
        function initBoard() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        }

        // 4. 生成随机方块
        function getRandomShape() {
            const index = Math.floor(Math.random() * SHAPES.length);
            return {
                shape: SHAPES[index],
                color: COLORS[index],
                x: Math.floor(COLS / 2) - Math.floor(SHAPES[index][0].length / 2),
                y: 0
            };
        }

        let currentPiece = null;

        // 5. 绘制方块
        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
        }

        // 6. 绘制游戏面板
        function drawBoard() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已落下的方块
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(x, y, board[y][x]);
                    }
                }
            }

            // 绘制当前移动的方块
            if (currentPiece) {
                const { shape, color, x, y } = currentPiece;
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            drawBlock(x + col, y + row, color);
                        }
                    }
                }
            }
        }

        // 7. 碰撞检测
        function checkCollision(shape, posX, posY) {
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[row].length; col++) {
                    if (shape[row][col]) {
                        const newX = posX + col;
                        const newY = posY + row;
                        // 检查是否超出边界或与已有方块重叠
                        if (
                            newX < 0 || 
                            newX >= COLS || 
                            newY >= ROWS || 
                            (newY >= 0 && board[newY][newX])
                        ) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 8. 固定方块到面板
        function lockPiece() {
            const { shape, color, x, y } = currentPiece;
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[row].length; col++) {
                    if (shape[row][col]) {
                        // 游戏结束判断（方块超出顶部）
                        if (y + row < 0) {
                            gameOver();
                            return;
                        }
                        board[y + row][x + col] = color;
                    }
                }
            }
            // 消除满行
            clearLines();
            // 生成新方块
            currentPiece = getRandomShape();
        }

        // 9. 消除满行并计分
        function clearLines() {
            let linesCleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell)) {
                    // 移除满行
                    board.splice(y, 1);
                    // 在顶部添加空行
                    board.unshift(Array(COLS).fill(0));
                    // 行数加1，并且y不递减（因为行被删除了）
                    y++;
                    linesCleared++;
                }
            }

            // 根据消除的行数计分
            switch(linesCleared) {
                case 1: score += 100; break;
                case 2: score += 300; break;
                case 3: score += 500; break;
                case 4: score += 800; break;
            }
            scoreElement.textContent = score;
        }

        // 10. 旋转方块
        function rotatePiece() {
            if (!currentPiece || isPaused) return;
            
            // 深拷贝当前形状
            const rotated = currentPiece.shape[0].map((_, index) => 
                currentPiece.shape.map(row => row[index]).reverse()
            );
            
            // 碰撞检测，如果旋转后碰撞则不旋转
            if (!checkCollision(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
            }
        }

        // 11. 移动方块
        function movePiece(dx, dy) {
            if (!currentPiece || isPaused) return;
            
            const newX = currentPiece.x + dx;
            const newY = currentPiece.y + dy;
            
            if (!checkCollision(currentPiece.shape, newX, newY)) {
                currentPiece.x = newX;
                currentPiece.y = newY;
                return true;
            }

            // 如果是向下移动碰撞，说明方块落地
            if (dy > 0) {
                lockPiece();
            }
            return false;
        }

        // 12. 方块下落
        function dropPiece() {
            if (!isRunning || isPaused) return;
            movePiece(0, 1);
            drawBoard();
        }

        // 13. 游戏开始
        function startGame() {
            if (isRunning && !isPaused) return;
            
            if (!isRunning) {
                initBoard();
                score = 0;
                scoreElement.textContent = score;
                currentPiece = getRandomShape();
                isRunning = true;
                isPaused = false;
                
                // 设置方块下落定时器（每500ms下落一次）
                gameInterval = setInterval(dropPiece, 500);
            } else if (isPaused) {
                // 恢复暂停
                isPaused = false;
                gameInterval = setInterval(dropPiece, 500);
            }
            
            startBtn.disabled = true;
            pauseBtn.disabled = false;
        }

        // 14. 暂停游戏
        function pauseGame() {
            if (!isRunning || isPaused) return;
            
            isPaused = true;
            clearInterval(gameInterval);
            pauseBtn.textContent = "继续游戏";
        }

        // 15. 继续游戏（暂停按钮复用）
        function resumeGame() {
            if (!isRunning || !isPaused) return;
            
            isPaused = false;
            gameInterval = setInterval(dropPiece, 500);
            pauseBtn.textContent = "暂停游戏";
        }

        // 16. 游戏结束
        function gameOver() {
            clearInterval(gameInterval);
            isRunning = false;
            isPaused = false;
            alert(`游戏结束！你的得分：${score}`);
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = "暂停游戏";
        }

        // 17. 重新开始游戏
        function restartGame() {
            clearInterval(gameInterval);
            isRunning = false;
            isPaused = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = "暂停游戏";
            initBoard();
            score = 0;
            scoreElement.textContent = score;
            drawBoard();
        }

        // 18. 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isRunning || isPaused) return;
            
            switch(e.key) {
                case 'ArrowLeft': // 左移
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight': // 右移
                    movePiece(1, 0);
                    break;
                case 'ArrowDown': // 下移
                    movePiece(0, 1);
                    break;
                case 'ArrowUp': // 旋转
                    rotatePiece();
                    break;
                case ' ': // 空格直接下落
                    while(movePiece(0, 1));
                    break;
                case 'p': // P键暂停
                    isPaused ? resumeGame() : pauseGame();
                    break;
            }
            drawBoard();
        });

        // 19. 按钮事件绑定
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', () => {
            isPaused ? resumeGame() : pauseGame();
        });
        restartBtn.addEventListener('click', restartGame);

        // 初始化游戏面板
        initBoard();
        drawBoard();
    </script>
</body>
</html>
